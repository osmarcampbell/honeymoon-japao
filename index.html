    <style>
        :root {
            --primary: #1a2a6c;
            --secondary: #b21f1f;
            --accent: #d4af37;
            --bg: #f4f4f4;
            --card-bg: #ffffff;
            --text: #2d3436;
        }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background: var(--bg); color: var(--text); line-height: 1.6; }
        header { background: linear-gradient(to right, #1a2a6c, #b21f1f, #fdbb2d); color: white; padding: 30px 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .nav-container { sticky; top: 0; background: white; z-index: 1000; display: flex; overflow-x: auto; padding: 10px; border-bottom: 2px solid var(--accent); gap: 10px; }
        .nav-item { padding: 8px 18px; background: #eee; border-radius: 25px; white-space: nowrap; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.3s; border: 1px solid #ddd; }
        .nav-item.active { background: var(--primary); color: white; border-color: var(--primary); }
        .container { padding: 20px; max-width: 900px; margin: auto; }
        .day-content { display: none; animation: slideIn 0.4s ease-out; }
        .day-content.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .section-title { color: var(--secondary); border-bottom: 2px solid var(--accent); padding-bottom: 5px; margin-top: 25px; display: flex; align-items: center; gap: 10px; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 15px; border-left: 6px solid var(--primary); }
        .time { font-weight: bold; color: var(--secondary); background: #fff5f5; padding: 2px 8px; border-radius: 5px; margin-right: 10px; }
        .hotel-box { background: #e3f2fd; border: 1px solid #90caf9; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .tip-box { background: #fff9db; border-left: 5px solid #fcc419; padding: 10px; font-size: 0.9em; margin-top: 10px; }
        .highlight { color: var(--primary); font-weight: bold; }
        footer { text-align: center; padding: 40px 20px; color: #777; font-size: 0.8em; }
    </style>
</head>

    function renderNav() {
        const nav = document.getElementById('navbar');
        roteiroCompleto.forEach((dia, index) => {
            const div = document.createElement('div');
            div.className = `nav-item ${index === 0 ? 'active' : ''}`;
            div.innerText = `${dia.data}`;
            div.onclick = () => showDay(dia.id, div);
            nav.appendChild(div);
        });
    }

    function renderContent() {
        const main = document.getElementById('main-content');
        roteiroCompleto.forEach((dia, index) => {
            const section = document.createElement('div');
            section.id = `day-${dia.id}`;
            section.className = `day-content ${index === 0 ? 'active' : ''}`;
            
            let itensHtml = dia.itens.map(item => `
                <div class="card">
                    <div><span class="time">${item.hora}</span> <span class="highlight">${item.local}</span></div>
                    <div style="margin-top:8px;">${item.acao}</div>
                </div>
            `).join('');

            section.innerHTML = `
                <div class="hotel-box">🏨 <strong>Acomodação:</strong> ${dia.hotel}</div>
                <h2 class="section-title">📅 ${dia.data} (${dia.diaSemana}) - ${dia.titulo}</h2>
                ${itensHtml}
                <div class="tip-box">✨ <strong>Dica do Concierge:</strong> Use o Google Maps para trajetos em tempo real e não esqueça de carregar seu Suica/Pasmo no celular!</div>
            `;
            main.appendChild(section);
        });
    }

    function showDay(id, element) {
        document.querySelectorAll('.day-content').forEach(d => d.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        
        document.getElementById(`day-${id}`).classList.add('active');
        element.classList.add('active');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    renderNav();
    renderContent();
</script>
