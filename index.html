    <style>
        :root { --primary: #0a192f; --secondary: #c0392b; --accent: #d4af37; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; margin: 0; background: var(--bg); color: #333; }
        header { background: var(--primary); color: white; padding: 25px 15px; text-align: center; border-bottom: 4px solid var(--accent); position: sticky; top: 0; z-index: 2000; }
        .nav-container { position: sticky; top: 89px; background: white; z-index: 1000; display: flex; overflow-x: auto; padding: 12px; border-bottom: 2px solid #ddd; gap: 8px; -webkit-overflow-scrolling: touch; }
        .nav-item { padding: 10px 18px; background: #f0f0f0; border-radius: 25px; white-space: nowrap; cursor: pointer; font-size: 13px; font-weight: bold; border: 1px solid #ccc; transition: 0.2s; }
        .nav-item.active { background: var(--secondary); color: white; border-color: var(--secondary); }
        .container { padding: 20px; max-width: 900px; margin: auto; padding-bottom: 100px; }
        .day-content { display: none; }
        .day-content.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: white; padding: 18px; border-radius: 12px; box-shadow: 0 3px 10px rgba(0,0,0,0.08); margin-bottom: 15px; border-left: 6px solid var(--accent); }
        .hotel-tag { background: #e3f2fd; color: #0d47a1; padding: 12px; border-radius: 10px; font-weight: bold; margin-bottom: 20px; border: 1px solid #bbdefb; display: flex; align-items: center; gap: 10px; }
        .time { color: var(--secondary); font-weight: 800; font-size: 0.95em; display: block; margin-bottom: 5px; }
        .loc { font-weight: 700; color: var(--primary); font-size: 1.1em; display: block; margin-bottom: 8px; }
        .info { font-size: 0.95em; line-height: 1.6; color: #444; }
        .pro-tip { background: #fff9db; border-left: 4px solid #fcc419; padding: 12px; margin-top: 15px; font-size: 0.9em; border-radius: 0 8px 8px 0; }
        footer { text-align: center; padding: 40px; background: #fff; border-top: 1px solid #ddd; font-size: 12px; color: #777; }
    </style>
</head>

    const nav = document.getElementById('navbar');
    const content = document.getElementById('content');

    roteiro.forEach((dia, idx) => {
        const btn = document.createElement('div');
        btn.className = `nav-item ${idx === 0 ? 'active' : ''}`;
        btn.innerHTML = `${dia.d}<br><span style="font-size:10px">${dia.t.substring(0,10)}...</span>`;
        btn.onclick = () => showDay(idx, btn);
        nav.appendChild(btn);

        const section = document.createElement('div');
        section.className = `day-content ${idx === 0 ? 'active' : ''}`;
        section.id = `day-${idx}`;

        let atvs = dia.at.map(a => `
            <div class="card">
                <span class="time">🕒 ${a.h}</span>
                <span class="loc">📍 ${a.l}</span>
                <div class="info">${a.d}</div>
            </div>
        `).join('');

        section.innerHTML = `
            <h2 style="color:var(--secondary); border-bottom: 2px solid var(--accent); padding-bottom:10px;">${dia.d} - ${dia.t}</h2>
            <div class="hotel-tag">🏨 Hotel: ${dia.h}</div>
            ${atvs}
            <div class="pro-tip">💡 <strong>Dica do Concierge:</strong> Use o Google Maps para trajetos de trem e o Google Lens para traduzir cardápios instantaneamente!</div>
        `;
        content.appendChild(section);
    });

    function showDay(idx, el) {
        document.querySelectorAll('.day-content').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(`day-${idx}`).classList.add('active');
        el.classList.add('active');
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

</html>
